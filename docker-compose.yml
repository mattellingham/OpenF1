services:
  openf1-dashboard:
    build: .
    container_name: openf1-dashboard
    ports:
      - "8501:8501"        # Access on http://<your-vm-ip>:8501
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
